<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GridPop — Terms of Service</title>
<meta name="description" content="GridPop Terms of Service.">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="inner">
    <h1>GridPop — Legal</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="terms.html" class="active">Terms</a>
      <a href="privacy.html">Privacy</a>
    </nav>
  </div>
</header>
<main>
  <div id="content" class="loading">Loading…</div>
</main>
<footer>
  &copy; <span id="y"></span> GridPop. All rights reserved.
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
</footer>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
(async () => {
  const el = document.getElementById('content');
  try {
    const res = await fetch('TERMS.md', { cache: 'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const md = await res.text();
    marked.setOptions({ gfm: true, breaks: false });
    el.innerHTML = marked.parse(md);
    el.classList.remove('loading');
    document.title = 'GridPop — Terms of Service';
  } catch (e) {
    el.textContent = 'Failed to load Terms. Please reload.';
  }
})();
</script>
</body>
</html>
